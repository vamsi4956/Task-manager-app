<!DOCTYPE html>
<html>
<head>
<title>Movie Recommendation System</title>

<style>

body{
background:#141414;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

form{
text-align:center;
margin-bottom:30px;
}

input{
padding:10px;
width:400px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#e50914;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
margin-top:20px;
}

.movie{
position:relative;
transition:0.3s;
}

.movie img{
width:100%;
border-radius:8px;
}

.movie:hover{
transform:scale(1.1);
}

.title{
text-align:center;
margin-top:8px;
font-size:14px;
}

</style>

</head>

<body>

<h1>🎬 Movie Recommendation System</h1>

<form method="POST">

<input
type="text"
name="watched"
placeholder="Enter movies you watched (Example: Avatar, Titanic)"
required>

<button type="submit">Recommend</button>

</form>

{% if recs %}

<h2>Recommended Movies</h2>

<div class="results">

{% for r in recs %}

<div class="movie">

<img src="{{r.poster}}">

<div class="title">{{r.title}}</div>

</div>

{% endfor %}

</div>

{% endif %}

</body>
</html>
